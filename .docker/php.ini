; PHP-Konfiguration fuer rss-grabber Docker

[PHP]
; Fehlerbehandlung
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/log/php-error.log

; RSS-Feeds werden per fopen()/SimpleXML von externen URLs geladen
allow_url_fopen = On

; Speicherlimits
memory_limit = 256M
post_max_size = 64M
upload_max_filesize = 64M
max_execution_time = 300
max_input_time = 300

; Zeitzone
date.timezone = Europe/Berlin

; Session
session.save_handler = files
session.save_path = /tmp
session.gc_maxlifetime = 1440

; Mail (ueber msmtp an Mailpit)
sendmail_path = /usr/bin/msmtp -t

; Zeichenkodierung
default_charset = UTF-8

; OPcache (fuer Entwicklung deaktiviert)
opcache.enable = 0
opcache.enable_cli = 0
