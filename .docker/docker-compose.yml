# Container-/Projektname entspricht der Projekt-Domain "rss-grabber"
name: rss-grabber

services:
  # --- Web-Server (Apache + PHP 8.5) ---
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rss-grabber_web
    ports:
      - "8340:80"
    volumes:
      - ../:/var/www/html
      # "Php Hourlog" -> wird direkt ins .docker-Verzeichnis auf Windows geschrieben
      - ./php-error.log:/var/log/php-error.log
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - db
      - mailpit
    environment:
      - DOCKER_ENV=true
      - PHP_MEMORY_LIMIT=256M
    networks:
      - rss-grabber-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- Datenbank (MySQL) ---
  db:
    image: mysql:8.0
    container_name: rss-grabber_db
    ports:
      - "3350:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rss_grabber
      MYSQL_USER: rss_grabber
      MYSQL_PASSWORD: rss_grabber_secret
    volumes:
      - rss-grabber-db-data:/var/lib/mysql
      # Init-Skript: legt Tabellen feeds/feeds_post an und befuellt sie mit Beispiel-Feeds
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - rss-grabber-network
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci

  # --- Datenbank-Verwaltung ---
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: rss-grabber_phpmyadmin
    ports:
      - "8341:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db
    networks:
      - rss-grabber-network

  # --- Mail-Server (Mailpit) ---
  mailpit:
    image: axllent/mailpit
    container_name: rss-grabber_mailpit
    ports:
      - "1140:1025"
      - "8342:8025"
    networks:
      - rss-grabber-network

networks:
  rss-grabber-network:
    driver: bridge
    ipam:
      driver: default
      config:
        # Explizites Subnetz, da Dockers Standard-Pool (172.17-172.31) erschoepft ist.
        # 10.123.0.0/24 ist bereits durch terminverwaltungs-script belegt -> 10.124.0.0/24.
        - subnet: 10.124.0.0/24

volumes:
  rss-grabber-db-data:
